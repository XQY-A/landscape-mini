name: Build and Validate Image

on:
  workflow_call:
    inputs:
      base_system:
        required: true
        type: string
      include_docker:
        required: true
        type: string
      output_formats:
        required: false
        type: string
        default: "img"
      run_e2e:
        required: false
        type: boolean
        default: true
      landscape_version:
        required: false
        type: string
        default: ""
      config_profile:
        required: false
        type: string
        default: "default"
      topology_source:
        required: false
        type: string
        default: "default"
      lan_server_ip:
        required: false
        type: string
        default: ""
      lan_range_start:
        required: false
        type: string
        default: ""
      lan_range_end:
        required: false
        type: string
        default: ""
      lan_netmask:
        required: false
        type: string
        default: ""
      root_password:
        required: false
        type: string
        default: "landscape"
      root_password_source:
        required: false
        type: string
        default: "default"
      api_username:
        required: false
        type: string
        default: "root"
      api_username_source:
        required: false
        type: string
        default: "default"
      api_password:
        required: false
        type: string
        default: "root"
      api_password_source:
        required: false
        type: string
        default: "default"
      image_retention_days:
        required: false
        type: number
        default: 30
      log_retention_days:
        required: false
        type: number
        default: 7

env:
  TEST_LOG_DIR: output/test-logs

jobs:
  build-and-validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve validation metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          requested_version="${{ inputs.landscape_version }}"
          resolved_version="$requested_version"
          if [ -z "$resolved_version" ]; then
            source build.env
            resolved_version="$LANDSCAPE_VERSION"
          fi

          build_name="landscape-mini-x86-${{ inputs.base_system }}"
          if [ "${{ inputs.include_docker }}" = "true" ]; then
            build_name="${build_name}-docker"
          fi

          artifact_tuple="${{ inputs.base_system }}-docker-${{ inputs.include_docker }}"
          artifact_id="${artifact_tuple}-${resolved_version}-${GITHUB_SHA::12}-${GITHUB_RUN_ID}"
          {
            echo "resolved_version=$resolved_version"
            echo "build_name=$build_name"
            echo "artifact_tuple=$artifact_tuple"
            echo "artifact_id=$artifact_id"
            echo "image_artifact=landscape-mini-x86-$artifact_id"
            echo "log_artifact=test-logs-$artifact_id"
          } >> "$GITHUB_OUTPUT"

      - name: Render effective topology config
        env:
          LANDSCAPE_LAN_SERVER_IP: ${{ inputs.lan_server_ip }}
          LANDSCAPE_LAN_RANGE_START: ${{ inputs.lan_range_start }}
          LANDSCAPE_LAN_RANGE_END: ${{ inputs.lan_range_end }}
          LANDSCAPE_LAN_NETMASK: ${{ inputs.lan_netmask }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p output/metadata
          bash .github/scripts/render-effective-topology.sh output/metadata/effective-landscape_init.toml

      - name: Maximize build space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Install dependencies
        timeout-minutes: 10
        shell: bash
        run: |
          set -euo pipefail

          apt_retry() {
            local attempt
            for attempt in 1 2 3; do
              if "$@"; then
                return 0
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "Command failed after ${attempt} attempts: $*" >&2
                return 1
              fi
              echo "Command failed on attempt ${attempt}, retrying: $*" >&2
            done
          }

          apt_retry sudo apt-get \
            -o Acquire::Retries=3 \
            -o Acquire::http::Timeout=60 \
            -o Acquire::https::Timeout=60 \
            update

          apt_retry sudo apt-get \
            -o Acquire::Retries=3 \
            -o Acquire::http::Timeout=60 \
            -o Acquire::https::Timeout=60 \
            install -y debootstrap parted dosfstools e2fsprogs \
            grub-efi-amd64-bin grub-pc-bin qemu-utils rsync curl \
            sshpass socat jq qemu-system-x86 ovmf

      - name: Build image (${{ inputs.base_system }}, docker=${{ inputs.include_docker }})
        env:
          RESOLVED_VERSION: ${{ steps.meta.outputs.resolved_version }}
          EFFECTIVE_CONFIG_PATH: ${{ github.workspace }}/output/metadata/effective-landscape_init.toml
          EFFECTIVE_CONFIG_PROFILE: ${{ inputs.config_profile }}
          EFFECTIVE_TOPOLOGY_SOURCE: ${{ inputs.topology_source }}
          ROOT_PASSWORD: ${{ inputs.root_password }}
          ROOT_PASSWORD_SOURCE: ${{ inputs.root_password_source }}
          LANDSCAPE_ADMIN_USER: ${{ inputs.api_username }}
          LANDSCAPE_ADMIN_USER_SOURCE: ${{ inputs.api_username_source }}
          LANDSCAPE_ADMIN_PASS: ${{ inputs.api_password }}
          LANDSCAPE_ADMIN_PASS_SOURCE: ${{ inputs.api_password_source }}
        shell: bash
        run: |
          set -euo pipefail

          version_flag=()
          if [ -n "${RESOLVED_VERSION}" ]; then
            version_flag=(--version "${RESOLVED_VERSION}")
          fi

          format_flags=()
          IFS=',' read -r -a requested_formats <<< "${{ inputs.output_formats }}"
          for fmt in "${requested_formats[@]}"; do
            fmt="${fmt//[[:space:]]/}"
            [ -n "$fmt" ] || continue
            format_flags+=(--output-format "$fmt")
          done

          sudo APT_MIRROR="" ALPINE_MIRROR="" \
            EFFECTIVE_CONFIG_PATH="${EFFECTIVE_CONFIG_PATH}" \
            EFFECTIVE_CONFIG_PROFILE="${EFFECTIVE_CONFIG_PROFILE}" \
            EFFECTIVE_TOPOLOGY_SOURCE="${EFFECTIVE_TOPOLOGY_SOURCE}" \
            ROOT_PASSWORD="${ROOT_PASSWORD}" \
            ROOT_PASSWORD_SOURCE="${ROOT_PASSWORD_SOURCE}" \
            LANDSCAPE_ADMIN_USER="${LANDSCAPE_ADMIN_USER}" \
            LANDSCAPE_ADMIN_USER_SOURCE="${LANDSCAPE_ADMIN_USER_SOURCE}" \
            LANDSCAPE_ADMIN_PASS="${LANDSCAPE_ADMIN_PASS}" \
            LANDSCAPE_ADMIN_PASS_SOURCE="${LANDSCAPE_ADMIN_PASS_SOURCE}" \
            ./build.sh \
            "${version_flag[@]}" \
            --base-system "${{ inputs.base_system }}" \
            --include-docker "${{ inputs.include_docker }}" \
            "${format_flags[@]}"

      - name: Fix output permissions
        run: sudo chown -R "$(id -u):$(id -g)" output/ work/

      - name: Capture artifact metadata
        env:
          RESOLVED_VERSION: ${{ steps.meta.outputs.resolved_version }}
          ARTIFACT_ID: ${{ steps.meta.outputs.artifact_id }}
          BUILD_NAME: ${{ steps.meta.outputs.build_name }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p output/metadata "${TEST_LOG_DIR}"

          metadata_path="output/metadata/build-metadata.txt"
          if [ -f "$metadata_path" ]; then
            source "$metadata_path"
          fi

          image_file="${image_file:-${BUILD_NAME}.img}"
          produced_files="${produced_files:-$image_file}"

          printf '%s\n' \
            "base_system=${{ inputs.base_system }}" \
            "include_docker=${{ inputs.include_docker }}" \
            "output_formats=${{ inputs.output_formats }}" \
            "produced_files=${produced_files}" \
            "landscape_version=${landscape_version:-${RESOLVED_VERSION}}" \
            "resolved_version=${RESOLVED_VERSION}" \
            "artifact_id=${ARTIFACT_ID}" \
            "artifact_tuple=${{ steps.meta.outputs.artifact_tuple }}" \
            "git_sha=${GITHUB_SHA}" \
            "run_id=${GITHUB_RUN_ID}" \
            "workflow=${GITHUB_WORKFLOW}" \
            "build_name=${BUILD_NAME}" \
            "image_file=${image_file}" \
            "config_profile=${{ inputs.config_profile }}" \
            "topology_source=${{ inputs.topology_source }}" \
            "root_password_source=${{ inputs.root_password_source }}" \
            "api_username_source=${{ inputs.api_username_source }}" \
            "api_password_source=${{ inputs.api_password_source }}" \
            "api_username=${{ inputs.api_username }}" \
            "resolved_apt_mirror=${resolved_apt_mirror:-unused}" \
            "resolved_apt_mirror_source=${resolved_apt_mirror_source:-unused}" \
            "resolved_alpine_mirror=${resolved_alpine_mirror:-unused}" \
            "resolved_alpine_mirror_source=${resolved_alpine_mirror_source:-unused}" \
            "resolved_docker_apt_mirror=${resolved_docker_apt_mirror:-unused}" \
            "resolved_docker_apt_mirror_source=${resolved_docker_apt_mirror_source:-unused}" \
            "resolved_docker_apt_gpg_url=${resolved_docker_apt_gpg_url:-unused}" \
            "resolved_docker_apt_gpg_url_source=${resolved_docker_apt_gpg_url_source:-unused}" \
            > output/metadata/build-metadata.txt

          cp output/metadata/build-metadata.txt "${TEST_LOG_DIR}/build-metadata.txt"

      - name: List outputs
        run: ls -lh output/

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.image_artifact }}
          path: |
            output/*.img
            output/*.vmdk
            output/*.ova
            output/metadata/build-metadata.txt
            output/metadata/effective-landscape_init.toml
          retention-days: ${{ inputs.image_retention_days }}

      - name: Run readiness checks (${{ inputs.base_system }}, docker=${{ inputs.include_docker }})
        env:
          LANDSCAPE_TEST_BASE_SYSTEM: ${{ inputs.base_system }}
          LANDSCAPE_TEST_INCLUDE_DOCKER: ${{ inputs.include_docker }}
          LANDSCAPE_TEST_OUTPUT_FORMATS: ${{ inputs.output_formats }}
          LANDSCAPE_TEST_ARTIFACT_ID: ${{ steps.meta.outputs.artifact_id }}
          LANDSCAPE_TEST_LANDSCAPE_VERSION: ${{ steps.meta.outputs.resolved_version }}
          LANDSCAPE_EFFECTIVE_INIT_CONFIG: output/metadata/effective-landscape_init.toml
          SSH_PASSWORD: ${{ inputs.root_password }}
          API_USERNAME: ${{ inputs.api_username }}
          API_PASSWORD: ${{ inputs.api_password }}
        run: timeout --foreground 20m ./tests/test-readiness.sh output/${{ steps.meta.outputs.build_name }}.img

      - name: Run dataplane tests (${{ inputs.base_system }}, docker=${{ inputs.include_docker }})
        if: ${{ inputs.run_e2e }}
        env:
          LANDSCAPE_TEST_BASE_SYSTEM: ${{ inputs.base_system }}
          LANDSCAPE_TEST_INCLUDE_DOCKER: ${{ inputs.include_docker }}
          LANDSCAPE_TEST_OUTPUT_FORMATS: ${{ inputs.output_formats }}
          LANDSCAPE_TEST_ARTIFACT_ID: ${{ steps.meta.outputs.artifact_id }}
          LANDSCAPE_TEST_LANDSCAPE_VERSION: ${{ steps.meta.outputs.resolved_version }}
          LANDSCAPE_EFFECTIVE_INIT_CONFIG: output/metadata/effective-landscape_init.toml
          SSH_PASSWORD: ${{ inputs.root_password }}
          API_USERNAME: ${{ inputs.api_username }}
          API_PASSWORD: ${{ inputs.api_password }}
        run: timeout --foreground 25m ./tests/test-dataplane.sh output/${{ steps.meta.outputs.build_name }}.img

      - name: Mark E2E not scheduled for this build identity
        if: ${{ !inputs.run_e2e }}
        env:
          ARTIFACT_ID: ${{ steps.meta.outputs.artifact_id }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${TEST_LOG_DIR}"
          printf '%s\n' \
            "base_system=${{ inputs.base_system }}" \
            "include_docker=${{ inputs.include_docker }}" \
            "artifact_id=${ARTIFACT_ID}" \
            "reason=E2E reserved for include_docker=false builds only" \
            > "${TEST_LOG_DIR}/e2e-skipped.txt"

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.log_artifact }}
          path: output/test-logs/
          retention-days: ${{ inputs.log_retention_days }}
