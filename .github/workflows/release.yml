name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve promotion source
        id: source
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          release_tag="${GITHUB_REF_NAME}"
          target_sha="${GITHUB_SHA}"
          run_id="$(gh api --paginate \
            "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?branch=main&event=push&status=completed&head_sha=${target_sha}&per_page=100" \
            --jq '.workflow_runs[] | select(.conclusion == "success") | .id' | head -n 1)"
          if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
            echo "No successful ci.yml push run found on main for tag ${release_tag} at ${target_sha}" >&2
            exit 1
          fi
          {
            echo "release_tag=$release_tag"
            echo "target_sha=$target_sha"
            echo "source_run_id=$run_id"
          } >> "$GITHUB_OUTPUT"

      - name: Download CI image artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: landscape-mini-x86-*
          path: artifacts/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.source.outputs.source_run_id }}
          merge-multiple: false

      - name: Validate promoted artifacts
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          source build.env
          expected_version="$LANDSCAPE_VERSION"
          expected_tuples=(
            "debian:false"
            "debian:true"
            "alpine:false"
            "alpine:true"
          )
          found=0
          seen_tuples=","

          for dir in artifacts/*; do
            [ -d "$dir" ] || continue
            metadata="$dir/metadata/build-metadata.txt"
            config="$dir/metadata/effective-landscape_init.toml"
            image=("$dir"/*.img)
            if [ ! -f "$metadata" ]; then
              echo "Missing build metadata in $dir" >&2
              exit 1
            fi
            if [ ! -f "$config" ]; then
              echo "Missing effective topology config in $dir" >&2
              exit 1
            fi
            if [ ${#image[@]} -ne 1 ]; then
              echo "Expected exactly one raw image in $dir" >&2
              exit 1
            fi

            git_sha="$(awk -F'=' '/^git_sha=/{print $2; exit}' "$metadata")"
            base_system="$(awk -F'=' '/^base_system=/{print $2; exit}' "$metadata")"
            include_docker="$(awk -F'=' '/^include_docker=/{print $2; exit}' "$metadata")"
            output_formats="$(awk -F'=' '/^output_formats=/{print $2; exit}' "$metadata")"
            produced_files="$(awk -F'=' '/^produced_files=/{print $2; exit}' "$metadata")"
            artifact_id="$(awk -F'=' '/^artifact_id=/{print $2; exit}' "$metadata")"
            resolved_version="$(awk -F'=' '/^resolved_version=/{print $2; exit}' "$metadata")"
            tuple="${base_system}:${include_docker}"

            if [ "$git_sha" != "${{ steps.source.outputs.target_sha }}" ]; then
              echo "Artifact $artifact_id has git_sha=$git_sha, expected ${{ steps.source.outputs.target_sha }}" >&2
              exit 1
            fi
            if [ -z "$base_system" ] || [ -z "$include_docker" ] || [ -z "$artifact_id" ] || [ -z "$resolved_version" ]; then
              echo "Incomplete metadata in $metadata" >&2
              exit 1
            fi
            if [ "$resolved_version" != "$expected_version" ]; then
              echo "Artifact $artifact_id resolved_version=$resolved_version, expected $expected_version" >&2
              exit 1
            fi
            if [ -z "$output_formats" ] || [ -z "$produced_files" ]; then
              echo "Artifact $artifact_id missing output_formats or produced_files" >&2
              exit 1
            fi

            found=$((found + 1))
            seen_tuples+="${tuple},"
          done

          if [ "$found" -ne 4 ]; then
            echo "Expected 4 promoted artifacts, found $found" >&2
            exit 1
          fi

          for tuple in "${expected_tuples[@]}"; do
            if [[ "$seen_tuples" != *",${tuple},"* ]]; then
              echo "Missing promoted artifact for tuple ${tuple}" >&2
              exit 1
            fi
          done

      - name: Download validation logs
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: test-logs-*
          path: release-logs/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.source.outputs.source_run_id }}
          merge-multiple: false

      - name: Compress images
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in artifacts/*/*.img; do
            gzip -k "$f"
          done
          find artifacts -maxdepth 4 -type f | sort

      - name: Write release summary
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Release promotion"
            echo "- Tag: ${{ steps.source.outputs.release_tag }}"
            echo "- Source CI run: ${{ steps.source.outputs.source_run_id }}"
            echo "- Source commit: ${{ steps.source.outputs.target_sha }}"
            echo "- Validation: promoted existing CI artifacts only; no rebuild performed"
            echo "- Required tuple coverage: debian/alpine × include_docker true/false"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.img.gz
            artifacts/**/*.vmdk
            artifacts/**/*.ova
          generate_release_notes: true
