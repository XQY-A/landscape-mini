name: CI

on:
  workflow_dispatch:
    inputs:
      landscape_version:
        description: "Landscape version (latest or tag; empty uses build.env default)"
        default: ""
  pull_request:
    branches:
      - main
    paths:
      - build.sh
      - build.env
      - lib/**
      - rootfs/**
      - configs/**
      - tests/**
      - .github/**
      - CHANGELOG.md
  push:
    branches:
      - main
    tags-ignore:
      - 'v*'
    paths:
      - build.sh
      - build.env
      - lib/**
      - rootfs/**
      - configs/**
      - tests/**
      - .github/**
      - CHANGELOG.md

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  default:
    uses: ./.github/workflows/_build-and-validate.yml
    with:
      variant: default
      build_flags: ""
      run_e2e: true
      landscape_version: ${{ github.event.inputs.landscape_version || '' }}

  docker:
    uses: ./.github/workflows/_build-and-validate.yml
    with:
      variant: docker
      build_flags: --with-docker
      run_e2e: false
      landscape_version: ${{ github.event.inputs.landscape_version || '' }}

  alpine:
    uses: ./.github/workflows/_build-and-validate.yml
    with:
      variant: alpine
      build_flags: --base alpine
      run_e2e: true
      landscape_version: ${{ github.event.inputs.landscape_version || '' }}

  alpine-docker:
    uses: ./.github/workflows/_build-and-validate.yml
    with:
      variant: alpine-docker
      build_flags: --base alpine --with-docker
      run_e2e: false
      landscape_version: ${{ github.event.inputs.landscape_version || '' }}
