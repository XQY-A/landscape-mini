name: CI

on:
  workflow_dispatch:
    inputs:
      landscape_version:
        description: "Landscape version (latest or tag; empty uses build.env default)"
        default: ""
  pull_request:
    branches:
      - main
    paths:
      - build.sh
      - build.env
      - lib/**/*.sh
      - rootfs/**
      - configs/**
      - tests/**/*.sh
      - .github/scripts/**/*.sh
      - .github/workflows/*.yml
  push:
    branches:
      - main
    tags-ignore:
      - 'v*'
    paths:
      - build.sh
      - build.env
      - lib/**/*.sh
      - rootfs/**
      - configs/**
      - tests/**/*.sh
      - .github/scripts/**/*.sh
      - .github/workflows/*.yml

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || !github.event.repository.fork }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - base_system: debian
            include_docker: 'false'
            run_test: readiness,dataplane
    uses: ./.github/workflows/_build-and-validate.yml
    with:
      base_system: ${{ matrix.base_system }}
      include_docker: ${{ matrix.include_docker }}
      output_formats: img
      run_test: ${{ matrix.run_test }}
      landscape_version: ${{ github.event.inputs.landscape_version || '' }}
      release_channel: public-ci
      build_timeout_minutes: 4
