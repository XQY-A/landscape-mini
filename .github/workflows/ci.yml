name: CI

on:
  workflow_dispatch:
    inputs:
      landscape_version:
        description: "Landscape version (latest or tag; empty uses build.env default)"
        default: ""
  pull_request:
    branches:
      - main
    paths:
      - build.sh
      - build.env
      - lib/**
      - rootfs/**
      - configs/**
      - tests/**
      - .github/**
      - CHANGELOG.md
  push:
    branches:
      - main
    tags-ignore:
      - 'v*'
    paths:
      - build.sh
      - build.env
      - lib/**
      - rootfs/**
      - configs/**
      - tests/**
      - .github/**
      - CHANGELOG.md

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - base_system: debian
            include_docker: 'false'
          - base_system: debian
            include_docker: 'true'
          - base_system: alpine
            include_docker: 'false'
          - base_system: alpine
            include_docker: 'true'
    uses: ./.github/workflows/_build-and-validate.yml
    with:
      base_system: ${{ matrix.base_system }}
      include_docker: ${{ matrix.include_docker }}
      output_formats: img,vmdk,pve-ova
      run_e2e: ${{ matrix.include_docker == 'false' }}
      landscape_version: ${{ github.event.inputs.landscape_version || '' }}
