name: Test Image

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "构建 workflow run ID（留空时自动使用 main 上最新成功 CI）\nBuild workflow run ID (leave empty for latest successful CI run on main)"
        default: ""
      artifact_id:
        description: "Artifact 标识：<base_system>-docker-<include_docker>-<version>-<sha12>-<runid>（留空时自动解析最新）\nArtifact id: <base_system>-docker-<include_docker>-<version>-<sha12>-<runid> (leave empty to auto-resolve latest)"
        default: ""
      landscape_version:
        description: "用于校验 metadata 的 Landscape 版本（可选）\nExpected Landscape version for metadata (optional)"
        default: ""
      ssh_password:
        description: "复测用 Linux SSH 密码（如特别注重安全，请改用 GitHub Secrets）\nLinux SSH password for retest (if security matters, prefer GitHub Secrets)"
        default: ""
      api_username:
        description: "复测用 Web 管理用户名（如特别注重安全，请改用 GitHub Secrets）\nWeb admin username for retest (if security matters, prefer GitHub Secrets)"
        default: ""
      api_password:
        description: "复测用 Web 管理密码（如特别注重安全，请改用 GitHub Secrets）\nWeb admin password for retest (if security matters, prefer GitHub Secrets)"
        default: ""

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - base_system: debian
            include_docker: 'false'
          - base_system: debian
            include_docker: 'true'
          - base_system: alpine
            include_docker: 'false'
          - base_system: alpine
            include_docker: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve retest credentials
        id: creds
        env:
          INPUT_SSH_PASSWORD: ${{ github.event.inputs.ssh_password }}
          INPUT_API_USERNAME: ${{ github.event.inputs.api_username }}
          INPUT_API_PASSWORD: ${{ github.event.inputs.api_password }}
          SECRET_ROOT_PASSWORD: ${{ secrets.CUSTOM_ROOT_PASSWORD }}
          SECRET_API_USERNAME: ${{ secrets.CUSTOM_API_USERNAME }}
          SECRET_API_PASSWORD: ${{ secrets.CUSTOM_API_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          ssh_password="$INPUT_SSH_PASSWORD"
          if [ -z "$ssh_password" ]; then
            ssh_password="$SECRET_ROOT_PASSWORD"
          fi
          if [ -z "$ssh_password" ]; then
            ssh_password="landscape"
          fi

          api_username="$INPUT_API_USERNAME"
          if [ -z "$api_username" ]; then
            api_username="$SECRET_API_USERNAME"
          fi
          if [ -z "$api_username" ]; then
            api_username="root"
          fi

          api_password="$INPUT_API_PASSWORD"
          if [ -z "$api_password" ]; then
            api_password="$SECRET_API_PASSWORD"
          fi
          if [ -z "$api_password" ]; then
            api_password="root"
          fi

          {
            echo "ssh_password=$ssh_password"
            echo "api_username=$api_username"
            echo "api_password=$api_password"
          } >> "$GITHUB_OUTPUT"

      - name: Install test dependencies
        timeout-minutes: 10
        shell: bash
        run: |
          set -euo pipefail

          apt_retry() {
            local attempt
            for attempt in 1 2 3; do
              if "$@"; then
                return 0
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "Command failed after ${attempt} attempts: $*" >&2
                return 1
              fi
              echo "Command failed on attempt ${attempt}, retrying: $*" >&2
            done
          }

          apt_retry sudo apt-get \
            -o Acquire::Retries=3 \
            -o Acquire::http::Timeout=60 \
            -o Acquire::https::Timeout=60 \
            update

          apt_retry sudo apt-get \
            -o Acquire::Retries=3 \
            -o Acquire::http::Timeout=60 \
            -o Acquire::https::Timeout=60 \
            install -y sshpass socat curl jq qemu-system-x86 ovmf unzip

      - name: Resolve artifact names
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          requested_artifact_id="${{ github.event.inputs.artifact_id }}"
          run_id="${{ github.event.inputs.run_id }}"
          tuple_prefix="${{ matrix.base_system }}-docker-${{ matrix.include_docker }}-"

          if [ -n "$requested_artifact_id" ]; then
            artifact_id="$requested_artifact_id"
            case "$artifact_id" in
              ${tuple_prefix}*) ;;
              *)
                echo "Requested artifact_id $artifact_id does not match matrix tuple ${tuple_prefix}" >&2
                exit 1
                ;;
            esac
            if [ -z "$run_id" ]; then
              run_id="${artifact_id##*-}"
            fi
          else
            if [ -z "$run_id" ]; then
              run_id="$(gh api --paginate \
                "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?branch=main&event=push&status=completed&per_page=100" \
                --jq '.workflow_runs[] | select(.conclusion=="success") | .id' | head -n 1)"
              if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
                echo "No successful completed CI run found on main" >&2
                exit 1
              fi
            fi
            artifact_name="$(gh api \
              repos/${{ github.repository }}/actions/runs/${run_id}/artifacts \
              --jq ".artifacts[] | select(.name | startswith(\"landscape-mini-x86-${tuple_prefix}\")) | .name" | head -n 1)"
            if [ -z "$artifact_name" ]; then
              echo "Unable to resolve artifact for tuple ${tuple_prefix} from run ${run_id}" >&2
              exit 1
            fi
            artifact_id="${artifact_name#landscape-mini-x86-}"
          fi
          {
            echo "resolved_run_id=$run_id"
            echo "artifact_id=$artifact_id"
            echo "image_artifact=landscape-mini-x86-$artifact_id"
            echo "log_artifact=test-logs-$artifact_id"
          } >> "$GITHUB_OUTPUT"

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.meta.outputs.image_artifact }}
          path: output/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.meta.outputs.resolved_run_id }}

      - name: Restore build metadata into test logs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p output/test-logs
          resolved_version="${{ github.event.inputs.landscape_version }}"
          metadata_path="output/metadata/build-metadata.txt"
          if [ -f "$metadata_path" ]; then
            cp "$metadata_path" output/test-logs/build-metadata.txt
            if [ -z "$resolved_version" ]; then
              resolved_version="$(awk -F'=' '/^resolved_version=/{print $2; exit}' "$metadata_path")"
            fi
          fi
          if [ -z "$resolved_version" ]; then
            source build.env
            resolved_version="$LANDSCAPE_VERSION"
          fi
          echo "test_landscape_version=$resolved_version" >> "$GITHUB_ENV"
          if [ -f output/metadata/effective-landscape_init.toml ]; then
            cp output/metadata/effective-landscape_init.toml output/test-logs/effective-landscape_init.toml
          fi

      - name: List outputs
        run: ls -lh output/

      - name: Run readiness checks (${{ matrix.base_system }}, docker=${{ matrix.include_docker }})
        env:
          LANDSCAPE_TEST_BASE_SYSTEM: ${{ matrix.base_system }}
          LANDSCAPE_TEST_INCLUDE_DOCKER: ${{ matrix.include_docker }}
          LANDSCAPE_TEST_ARTIFACT_ID: ${{ steps.meta.outputs.artifact_id }}
          LANDSCAPE_TEST_LANDSCAPE_VERSION: ${{ env.test_landscape_version }}
          LANDSCAPE_EFFECTIVE_INIT_CONFIG: output/metadata/effective-landscape_init.toml
          SSH_PASSWORD: ${{ steps.creds.outputs.ssh_password }}
          API_USERNAME: ${{ steps.creds.outputs.api_username }}
          API_PASSWORD: ${{ steps.creds.outputs.api_password }}
        run: timeout --foreground 20m ./tests/test-readiness.sh output/*.img

      - name: Run dataplane tests (${{ matrix.base_system }}, docker=${{ matrix.include_docker }})
        if: ${{ matrix.include_docker == 'false' }}
        env:
          LANDSCAPE_TEST_BASE_SYSTEM: ${{ matrix.base_system }}
          LANDSCAPE_TEST_INCLUDE_DOCKER: ${{ matrix.include_docker }}
          LANDSCAPE_TEST_ARTIFACT_ID: ${{ steps.meta.outputs.artifact_id }}
          LANDSCAPE_TEST_LANDSCAPE_VERSION: ${{ env.test_landscape_version }}
          LANDSCAPE_EFFECTIVE_INIT_CONFIG: output/metadata/effective-landscape_init.toml
          SSH_PASSWORD: ${{ steps.creds.outputs.ssh_password }}
          API_USERNAME: ${{ steps.creds.outputs.api_username }}
          API_PASSWORD: ${{ steps.creds.outputs.api_password }}
        run: timeout --foreground 25m ./tests/test-dataplane.sh output/*.img

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-retest-${{ steps.meta.outputs.artifact_id }}
          path: output/test-logs/
          retention-days: 7
