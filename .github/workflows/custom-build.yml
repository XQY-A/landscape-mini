name: Custom Build

on:
  workflow_dispatch:
    inputs:
      base_system:
        description: "基础系统（首次推荐 debian）\nBase system (debian recommended for first-time users)"
        required: true
        default: debian
        type: choice
        options:
          - debian
          - alpine
      include_docker:
        description: "是否包含 Docker\nInclude Docker"
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      output_formats:
        description: "输出格式：img=raw 镜像，vmdk=VMDK，ova=生成 .ova；首次建议 img，PVE 建议 img,ova\nOutput formats: img=raw image, vmdk=VMDK, ova=downloadable .ova; first run: img, for PVE: img,ova"
        default: "img"
      landscape_version:
        description: "Landscape 版本（留空时使用 build.env 默认值）\nLandscape version (empty uses build.env default)"
        default: ""
      lan_server_ip:
        description: "LAN 网关或 DHCP 服务 IP（可选）\nLAN gateway / DHCP server IP (optional)"
        default: ""
      lan_range_start:
        description: "LAN DHCP 起始地址（可选）\nLAN DHCP range start (optional)"
        default: ""
      lan_range_end:
        description: "LAN DHCP 结束地址（可选）\nLAN DHCP range end (optional)"
        default: ""
      lan_netmask:
        description: "LAN 子网前缀长度，例如 24（可选）\nLAN subnet prefix length, e.g. 24 (optional)"
        default: ""
      root_password:
        description: "Linux root/ld 登录密码（如特别注重安全，请改用 GitHub Secrets）\nLinux root/ld password (if security matters, prefer GitHub Secrets)"
        default: ""
      api_username:
        description: "Web 管理用户名（如特别注重安全，请改用 GitHub Secrets）\nWeb admin username (if security matters, prefer GitHub Secrets)"
        default: ""
      api_password:
        description: "Web 管理密码（如特别注重安全，请改用 GitHub Secrets）\nWeb admin password (if security matters, prefer GitHub Secrets)"
        default: ""
      run_test:
        description: "测试选择：留空/none、readiness、readiness,dataplane\nTest selection: empty/none, readiness, readiness,dataplane"
        default: ""
        type: string

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      config_profile: ${{ steps.meta.outputs.config_profile }}
      topology_source: ${{ steps.meta.outputs.topology_source }}
      output_formats: ${{ steps.validate.outputs.output_formats }}
      run_test: ${{ steps.validate.outputs.run_test }}
    steps:
      - name: Validate workflow inputs early
        id: validate
        shell: bash
        env:
          INPUT_BASE_SYSTEM: ${{ github.event.inputs.base_system }}
          INPUT_INCLUDE_DOCKER: ${{ github.event.inputs.include_docker }}
          INPUT_OUTPUT_FORMATS: ${{ github.event.inputs.output_formats }}
          INPUT_RUN_TEST: ${{ github.event.inputs.run_test }}
          INPUT_LAN_SERVER_IP: ${{ github.event.inputs.lan_server_ip }}
          INPUT_LAN_RANGE_START: ${{ github.event.inputs.lan_range_start }}
          INPUT_LAN_RANGE_END: ${{ github.event.inputs.lan_range_end }}
          INPUT_LAN_NETMASK: ${{ github.event.inputs.lan_netmask }}
        run: |
          set -euo pipefail

          validate_base_system() {
            case "$1" in
              debian|alpine) ;;
              *)
                echo "ERROR: base_system must be 'debian' or 'alpine', got '$1'." >&2
                exit 1
                ;;
            esac
          }

          validate_include_docker() {
            case "$1" in
              true|false) ;;
              *)
                echo "ERROR: include_docker must be 'true' or 'false', got '$1'." >&2
                exit 1
                ;;
            esac
          }

          validate_output_format() {
            case "$1" in
              img|vmdk|ova) ;;
              *)
                echo "ERROR: Unsupported output format '$1'. Use img, vmdk, or ova." >&2
                exit 1
                ;;
            esac
          }

          normalize_output_formats() {
            local -a raw_items=()
            local -a normalized=()
            local raw_value trimmed
            local seen=","

            IFS=',' read -r -a raw_items <<< "${INPUT_OUTPUT_FORMATS}"
            for raw_value in "${raw_items[@]}"; do
              trimmed="${raw_value//[[:space:]]/}"
              [ -n "$trimmed" ] || continue
              validate_output_format "$trimmed"
              if [[ "$seen" == *",${trimmed},"* ]]; then
                continue
              fi
              normalized+=("$trimmed")
              seen+="${trimmed},"
            done

            if [ ${#normalized[@]} -eq 0 ]; then
              echo "ERROR: At least one output format is required." >&2
              exit 1
            fi

            OUTPUT_FORMATS_NORMALIZED="$(IFS=,; echo "${normalized[*]}")"
          }

          normalize_run_test_selection() {
            local selection="${INPUT_RUN_TEST,,}"
            selection="${selection//[[:space:]]/}"
            case "$selection" in
              "")
                RUN_TEST_NORMALIZED=
                ;;
              none)
                RUN_TEST_NORMALIZED=none
                ;;
              readiness)
                RUN_TEST_NORMALIZED=readiness
                ;;
              readiness,dataplane)
                RUN_TEST_NORMALIZED=readiness,dataplane
                ;;
              *)
                echo "ERROR: run_test must be empty, 'none', 'readiness', or 'readiness,dataplane'; got '${INPUT_RUN_TEST}'." >&2
                exit 1
                ;;
            esac
          }

          validate_ipv4() {
            local value="$1"
            local label="$2"
            [ -z "$value" ] && return 0
            if ! [[ "$value" =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
              echo "ERROR: ${label} must be an IPv4 address, got '$value'." >&2
              exit 1
            fi
            IFS='.' read -r a b c d <<< "$value"
            for octet in "$a" "$b" "$c" "$d"; do
              if [ "$octet" -gt 255 ]; then
                echo "ERROR: ${label} must be an IPv4 address, got '$value'." >&2
                exit 1
              fi
            done
          }

          validate_netmask() {
            local value="$1"
            [ -z "$value" ] && return 0
            if ! [[ "$value" =~ ^[0-9]+$ ]] || [ "$value" -lt 0 ] || [ "$value" -gt 32 ]; then
              echo "ERROR: lan_netmask must be an integer between 0 and 32, got '$value'." >&2
              exit 1
            fi
          }

          validate_base_system "$INPUT_BASE_SYSTEM"
          validate_include_docker "$INPUT_INCLUDE_DOCKER"
          normalize_output_formats
          normalize_run_test_selection
          validate_ipv4 "$INPUT_LAN_SERVER_IP" lan_server_ip
          validate_ipv4 "$INPUT_LAN_RANGE_START" lan_range_start
          validate_ipv4 "$INPUT_LAN_RANGE_END" lan_range_end
          validate_netmask "$INPUT_LAN_NETMASK"

          {
            echo "output_formats=$OUTPUT_FORMATS_NORMALIZED"
            echo "run_test=$RUN_TEST_NORMALIZED"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve config metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          topology_source=default
          if [ -n "${{ github.event.inputs.lan_server_ip }}" ] || [ -n "${{ github.event.inputs.lan_range_start }}" ] || [ -n "${{ github.event.inputs.lan_range_end }}" ] || [ -n "${{ github.event.inputs.lan_netmask }}" ]; then
            topology_source=input
          fi
          config_profile=default
          if [ "$topology_source" != default ]; then
            config_profile=custom
          fi
          {
            echo "config_profile=$config_profile"
            echo "topology_source=$topology_source"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare build summary
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Custom Build 请求摘要"
            echo ""
            echo "| 项目 | 值 |"
            echo "| --- | --- |"
            echo "| Repository owner | ${{ github.repository_owner }} |"
            echo "| 请求 tuple | ${{ github.event.inputs.base_system }} + docker=${{ github.event.inputs.include_docker }} |"
            echo "| 归一化 output_formats | ${{ steps.validate.outputs.output_formats }} |"
            echo "| 归一化 run_test | ${{ steps.validate.outputs.run_test || '(empty)' }} |"
            echo "| Landscape 版本输入 | ${{ github.event.inputs.landscape_version || '(build.env default)' }} |"
            echo "| 配置档案 | ${{ steps.meta.outputs.config_profile }} |"
            echo "| 拓扑来源 | ${{ steps.meta.outputs.topology_source }} |"
            echo ""
            echo "## 凭据来源"
            echo ""
            echo "| 凭据项 | 来源 |"
            echo "| --- | --- |"
            echo "| Linux 密码 | input-or-inherited-secret-or-default |"
            echo "| Web 用户名 | input-or-inherited-secret-or-default |"
            echo "| Web 密码 | input-or-inherited-secret-or-default |"
            echo ""
            echo "## 后续流程"
            echo ""
            echo "| 项目 | 说明 |"
            echo "| --- | --- |"
            echo "| Build job | 按归一化 tuple 继续执行 |"
            echo "| Latest release | 成功后更新固定入口 \`custom-build-latest\` |"
            echo "| 历史 release | 成功后新增 \`custom-build-<artifact_id>\`，保留历史结果 |"
            echo "| Workflow artifacts | 当前 run 的 Artifacts 保持不可变 |"
            echo "| Dataplane 规则 | 请求 \`readiness,dataplane\` 且 \`include_docker=true\` 时明确 skip |"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    needs: prepare
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/_build-and-validate.yml
    with:
      base_system: ${{ github.event.inputs.base_system }}
      include_docker: ${{ github.event.inputs.include_docker }}
      output_formats: ${{ needs.prepare.outputs.output_formats }}
      run_test: ${{ needs.prepare.outputs.run_test }}
      landscape_version: ${{ github.event.inputs.landscape_version }}
      compress_output: no
      config_profile: ${{ needs.prepare.outputs.config_profile }}
      topology_source: ${{ needs.prepare.outputs.topology_source }}
      lan_server_ip: ${{ github.event.inputs.lan_server_ip }}
      lan_range_start: ${{ github.event.inputs.lan_range_start }}
      lan_range_end: ${{ github.event.inputs.lan_range_end }}
      lan_netmask: ${{ github.event.inputs.lan_netmask }}
      root_password: ${{ github.event.inputs.root_password }}
      root_password_source: ${{ github.event.inputs.root_password != '' && 'input' || 'default' }}
      api_username: ${{ github.event.inputs.api_username }}
      api_username_source: ${{ github.event.inputs.api_username != '' && 'input' || 'default' }}
      api_password: ${{ github.event.inputs.api_password }}
      api_password_source: ${{ github.event.inputs.api_password != '' && 'input' || 'default' }}
      release_channel: custom-build-fixed
      release_tag: custom-build-latest
      repository_owner: ${{ github.repository_owner }}
      build_timeout_minutes: 10
    secrets: inherit

  publish-fixed-release:
    needs: build
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'workflow_dispatch' && needs.build.result == 'success' }}
    permissions:
      actions: read
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      RELEASE_TAG: custom-build-latest
      WORKFLOW_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.image_artifact }}
          path: dist/

      - name: Prepare fixed-release assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          metadata="dist/metadata/build-metadata.txt"
          if [ ! -f "$metadata" ]; then
            echo "Missing build metadata in downloaded artifact" >&2
            exit 1
          fi

          base_system=""
          include_docker=""
          produced_files=""
          output_formats=""
          artifact_id=""
          run_id=""
          while IFS='=' read -r key value; do
            case "$key" in
              base_system|include_docker|produced_files|output_formats|artifact_id|run_id)
                printf -v "$key" '%s' "$value"
                ;;
            esac
          done < "$metadata"

          for key in base_system include_docker produced_files output_formats artifact_id run_id; do
            if [ -z "${!key}" ]; then
              echo "Missing required key in build metadata: $key" >&2
              exit 1
            fi
          done

          history_tag="custom-build-${artifact_id}"
          base_name="landscape-mini-x86-${base_system}"
          if [ "$include_docker" = "true" ]; then
            base_name="${base_name}-docker"
          fi

          mkdir -p release-assets/latest release-assets/history
          IFS=',' read -r -a files <<< "$produced_files"
          for produced in "${files[@]}"; do
            produced="${produced//[[:space:]]/}"
            [ -n "$produced" ] || continue
            src="dist/${produced}"
            if [ ! -f "$src" ]; then
              echo "Produced file listed in metadata not found: $src" >&2
              exit 1
            fi

            case "$produced" in
              *.img.gz)
                target="${base_name}.img.gz"
                ;;
              *.vmdk.gz)
                target="${base_name}.vmdk.gz"
                ;;
              *.img)
                target="${base_name}.img"
                ;;
              *.vmdk)
                target="${base_name}.vmdk"
                ;;
              *.ova)
                target="${base_name}.ova"
                ;;
              *)
                echo "Unsupported produced file for fixed release: $produced" >&2
                exit 1
                ;;
            esac

            cp "$src" "release-assets/latest/${target}"
            cp "$src" "release-assets/history/${target}"
          done

          if [ -f "release-assets/latest/${base_name}.img" ] && [ ! -f "release-assets/latest/${base_name}.img.gz" ]; then
            gzip -k -f "release-assets/latest/${base_name}.img"
          fi
          if [ -f "release-assets/history/${base_name}.img" ] && [ ! -f "release-assets/history/${base_name}.img.gz" ]; then
            gzip -k -f "release-assets/history/${base_name}.img"
          fi

          if [ -f dist/metadata/effective-landscape_init.toml ]; then
            cp dist/metadata/effective-landscape_init.toml release-assets/latest/effective-landscape_init.toml
            cp dist/metadata/effective-landscape_init.toml release-assets/history/effective-landscape_init.toml
          fi

          for scope in latest history; do
            cp "$metadata" "release-assets/${scope}/build-metadata.txt"

            normalized_produced_files=""
            for asset in release-assets/${scope}/*; do
              name="$(basename "$asset")"
              case "$name" in
                build-metadata.txt|effective-landscape_init.toml|*.img|*.vmdk)
                  continue
                  ;;
              esac
              if [ -n "$normalized_produced_files" ]; then
                normalized_produced_files+=","
              fi
              normalized_produced_files+="$name"
            done

            if [ -z "$normalized_produced_files" ]; then
              echo "No release assets were prepared for ${scope} release" >&2
              exit 1
            fi

            tmp_metadata="$(mktemp)"
            awk -F= -v produced_files="$normalized_produced_files" '
              BEGIN { updated=0 }
              /^produced_files=/ { print "produced_files=" produced_files; updated=1; next }
              { print }
              END { if (!updated) print "produced_files=" produced_files }
            ' "$metadata" > "$tmp_metadata"
            mv "$tmp_metadata" "release-assets/${scope}/build-metadata.txt"
          done

          {
            echo "history_tag=$history_tag"
            echo "artifact_id=$artifact_id"
            echo "run_id=$run_id"
            echo "output_formats=$output_formats"
            echo "produced_files=$(awk -F= '/^produced_files=/{print $2; exit}' release-assets/latest/build-metadata.txt)"
          } >> "$GITHUB_OUTPUT"

      - name: Publish immutable history release
        shell: bash
        env:
          HISTORY_TAG: ${{ steps.assets.outputs.history_tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          history_files=(
            release-assets/history/*.img.gz
            release-assets/history/*.ova
            release-assets/history/*.vmdk.gz
            release-assets/history/build-metadata.txt
            release-assets/history/effective-landscape_init.toml
          )
          if [ ${#history_files[@]} -eq 0 ]; then
            echo "No history release assets were prepared" >&2
            exit 1
          fi

          if gh release view "$HISTORY_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "History release already exists: $HISTORY_TAG"
            exit 0
          fi

          gh release create "$HISTORY_TAG" "${history_files[@]}" \
            --repo "$GH_REPO" \
            --target "$GITHUB_SHA" \
            --title "Custom Build ${HISTORY_TAG#custom-build-}" \
            --notes "Immutable custom build result for artifact ${HISTORY_TAG#custom-build-}." \
            --prerelease

      - name: Publish or update latest release
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          latest_files=(release-assets/latest/*.img.gz release-assets/latest/*.ova release-assets/latest/*.vmdk.gz)
          if [ ${#latest_files[@]} -eq 0 ]; then
            echo "No publishable latest release assets were prepared" >&2
            exit 1
          fi

          latest_release_url="https://github.com/${GH_REPO}/releases/tag/${RELEASE_TAG}"
          notes_file="$(mktemp)"
          {
            echo 'Latest successful custom build for this repository owner.'
            echo ''
            echo 'Copy-ready latest release page:'
            echo ''
            printf '`%s`\n' "$latest_release_url"
            echo ''
            echo 'Copy-ready direct download links:'
            echo ''
            for asset_path in "${latest_files[@]}"; do
              asset_name="$(basename "$asset_path")"
              printf -- '- `%s`\n' "https://github.com/${GH_REPO}/releases/download/${RELEASE_TAG}/${asset_name}"
            done
          } > "$notes_file"

          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --repo "$GH_REPO" \
              --title "Custom Build Latest" \
              --notes-file "$notes_file"

            while IFS= read -r existing_asset; do
              case "$existing_asset" in
                landscape-mini-x86-*.img.gz|landscape-mini-x86-*.ova|landscape-mini-x86-*.vmdk.gz)
                  gh release delete-asset "$RELEASE_TAG" "$existing_asset" \
                    --repo "$GH_REPO" \
                    --yes
                  ;;
              esac
            done < <(gh release view "$RELEASE_TAG" --repo "$GH_REPO" --json assets --jq '.assets[].name')

            gh release upload "$RELEASE_TAG" "${latest_files[@]}" \
              --repo "$GH_REPO"
          else
            gh release create "$RELEASE_TAG" "${latest_files[@]}" \
              --repo "$GH_REPO" \
              --target "$GITHUB_SHA" \
              --title "Custom Build Latest" \
              --notes-file "$notes_file" \
              --prerelease
          fi


      - name: Publish fixed-release summary
        shell: bash
        env:
          HISTORY_TAG: ${{ steps.assets.outputs.history_tag }}
          ARTIFACT_ID: ${{ steps.assets.outputs.artifact_id }}
          BUILD_RUN_ID: ${{ steps.assets.outputs.run_id }}
          OUTPUT_FORMATS: ${{ steps.assets.outputs.output_formats }}
          PRODUCED_FILES: ${{ steps.assets.outputs.produced_files }}
        run: |
          set -euo pipefail
          latest_release_url="https://github.com/${{ github.repository }}/releases/tag/${RELEASE_TAG}"
          latest_download_base="https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}"
          history_release_url="https://github.com/${{ github.repository }}/releases/tag/${HISTORY_TAG}"
          history_download_base="https://github.com/${{ github.repository }}/releases/download/${HISTORY_TAG}"

          describe_asset() {
            case "$1" in
              *.ova) printf '%s' 'PVE / 虚拟化导入包' ;;
              *.img.gz) printf '%s' '压缩 raw 镜像' ;;
              *.vmdk.gz) printf '%s' '压缩 VMDK 镜像' ;;
              *) printf '%s' '构建产物' ;;
            esac
          }

          {
            echo '## Custom Build 最新产物'
            echo ''
            echo '| 项目 | 值 |'
            echo '| --- | --- |'
            echo "| Repository owner | ${{ github.repository_owner }} |"
            echo "| Tuple | ${{ github.event.inputs.base_system }} + docker=${{ github.event.inputs.include_docker }} |"
            echo "| artifact_id | ${ARTIFACT_ID} |"
            echo "| run_id | ${BUILD_RUN_ID} |"
            echo "| 请求的 output_formats | ${OUTPUT_FORMATS} |"
            echo "| 实际产物 | ${PRODUCED_FILES} |"
            echo ''
            echo '## 结果入口'
            echo ''
            echo '| 类型 | 链接 |'
            echo '| --- | --- |'
            echo "| Latest release 页面 | ${latest_release_url} |"
            echo "| Latest 下载基址 | ${latest_download_base} |"
            echo "| 历史 release 页面 | ${history_release_url} |"
            echo "| 历史下载基址 | ${history_download_base} |"
            echo "| 当前 workflow run | ${WORKFLOW_RUN_URL} |"
            echo ''
            echo '## 产物直链'
            echo ''
            echo '| 产物 | 类型 | Latest 直链 | 历史直链 |'
            echo '| --- | --- | --- | --- |'
            IFS=',' read -r -a files <<< "$PRODUCED_FILES"
            for asset in "${files[@]}"; do
              asset="${asset//[[:space:]]/}"
              [ -n "$asset" ] || continue
              latest_link="${latest_download_base}/${asset}"
              history_link="${history_download_base}/${asset}"
              echo "| ${asset} | $(describe_asset "$asset") | ${latest_link} | ${history_link} |"
            done
            echo ''
            echo '## 使用说明'
            echo ''
            echo '| 项目 | 说明 |'
            echo '| --- | --- |'
            echo '| Latest | 总是指向最近一次成功 Custom Build |'
            echo '| 历史 | 固定保留本次构建，不会被后续成功构建覆盖 |'
            echo '| build-metadata.txt | 已附带在历史 release 中，记录 tuple 与产物身份 |'
            echo '| effective-landscape_init.toml | 已附带在历史 release 中，记录最终生效网络配置 |'
            echo '| PVE 导入 | 导入后仍建议检查启动模式、磁盘控制器与 bridge 绑定 |'
            echo '| CPU type=host | Proxmox 当前不会稳定从 OVF 继承，必要时请导入后手动设置 |'
          } >> "$GITHUB_STEP_SUMMARY"
